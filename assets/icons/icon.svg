<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Card base -->
  <rect x="56" y="140" width="400" height="232" rx="24" fill="url(#card)"/>
  
  <!-- Magnetic stripe -->
  <rect x="56" y="196" width="400" height="48" fill="#1e3a8a"/>
  
  <!-- Chip -->
  <rect x="96" y="268" width="56" height="44" rx="8" fill="url(#chip)"/>
  
  <!-- Card number lines -->
  <line x1="176" y1="280" x2="320" y2="280" stroke="#94a3b8" stroke-width="12" stroke-linecap="round"/>
  <line x1="176" y1="308" x2="256" y2="308" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Contactless waves -->
  <path d="M 360 290 Q 380 270 380 290 Q 380 310 360 290" stroke="#60a5fa" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 380 290 Q 410 260 410 290 Q 410 320 380 290" stroke="#60a5fa" stroke-width="6" fill="none" stroke-linecap="round"/>
</svg>
